name: "Create Release For KLM Image"

permissions:
  id-token: write
  contents: read
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      name:
        description: "Release name"
        default: ""
        required: true
      since:
        description: "Changelog since"
        default: ""
        required: false
      skip_sec_scanners_bump:
        description: "Skip sec-scanners-config.yaml bump"
        type: boolean
        default: false

env:
  IMAGE_REPO: europe-docker.pkg.dev/kyma-project/prod/lifecycle-manager
  CODE_REPOSITORY: kyma-project/lifecycle-manager

jobs:
  validate-release:
    name: Validate release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
      - name: Validate the release tag
        run: ./.github/scripts/release/validate_release_tag.sh ${{ github.event.inputs.name }}
      - name: Check if release doesn't exist yet
        run: ./.github/scripts/release/get_release_by_tag.sh ${{ github.event.inputs.name }} ${{ secrets.GITHUB_TOKEN }}

  bump-images:
    name: Bump sec-scanners-config.yaml images
    runs-on: ubuntu-latest
    needs: validate-release
    if: ${{ !inputs.skip_sec_scanners_bump }}
    permissions:
      pull-requests: write
    outputs:
      pr_number: ${{ steps.open-pr.outputs.pr_number }}
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
      - name: Bump sec-scanners-config.yaml images
        run: |
          ./.github/scripts/release/bump_sec_scanners_versions.sh \
            ${{ github.event.inputs.name }} \
            europe-docker.pkg.dev/kyma-project/prod/lifecycle-manager \
            sec-scanners-config.yaml
      - name: Push version bump branch and open PR
        id: open-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "jellyfish-bot@users.noreply.github.com"
          git config --local user.name "jellyfish-bot"
          BRANCH="chore/bump-sec-scanners-${{ github.event.inputs.name }}"
          git checkout -b "${BRANCH}"
          git add sec-scanners-config.yaml
          git commit -m "chore: Bump sec-scanners-config.yaml .bdba image versions to ${{ github.event.inputs.name }}" || echo "No changes to commit"
          git push upstream "${BRANCH}"
          PR_URL=$(gh pr create \
            --title "chore: Bump sec-scanners-config.yaml .bdba image versions to ${{ github.event.inputs.name }}" \
            --body "Automated version bump of \`sec-scanners-config.yaml\` to \`${{ github.event.inputs.name }}\`." \
            --base main \
            --head "${BRANCH}")
          PR_NUMBER=$(echo "${PR_URL}" | grep -oE '[0-9]+$')
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "PR created: ${PR_URL}"

  await-bump-images-pr-merge:
    name: Wait for version bump PR to be merged
    runs-on: ubuntu-latest
    needs: bump-images
    if: ${{ !inputs.skip_sec_scanners_bump }}
    permissions:
      pull-requests: read
    steps:
      - name: Wait for PR to be merged
        timeout-minutes: 60
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ needs.bump-images.outputs.pr_number }}"
          
          echo "Waiting for PR #${PR_NUMBER} to be merged..."
          
          for i in {1..60}; do
            echo "Check ${i}/60: Checking PR status..."
            
            PR_STATE=$(gh pr view "${PR_NUMBER}" \
              --json state -q '.state')
            
            echo "PR #${PR_NUMBER} state: ${PR_STATE}"
            
            if [ "${PR_STATE}" = "MERGED" ]; then
              echo "✅ PR #${PR_NUMBER} is merged! Proceeding with release."
              exit 0
            elif [ "${PR_STATE}" = "CLOSED" ]; then
              echo "❌ PR #${PR_NUMBER} was closed without merging."
              exit 1
            fi
            
            if [ ${i} -lt 60 ]; then
              echo "⏳ PR not merged yet. Waiting 60 seconds before next check..."
              sleep 60
            fi
          done
          
          echo "❌ Timeout: PR #${PR_NUMBER} was not merged within 60 minutes."
          echo "Please merge the PR and re-run the workflow."
          exit 1

  draft-release:
    name: Create draft release
    runs-on: ubuntu-latest
    needs: [validate-release, await-bump-images-pr-merge]
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          ref: main  # Checkout main after version bump PR is merged
      - name: Create changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./.github/scripts/release/create_changelog.sh ${{ github.event.inputs.name }} ${{ env.IMAGE_REPO }}:${{ github.event.inputs.name }} ${{ github.event.inputs.since }}
      - name: Draft release
        id: draft-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_ID=$(./.github/scripts/release/draft_release.sh ${{ github.event.inputs.name }})
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT
      - name: Create tag
        run: |
          git tag ${{ github.event.inputs.name }}
          git push origin ${{ github.event.inputs.name }} --tags
    outputs:
      release_id: ${{ steps.draft-release.outputs.release_id }}
  builds:
    needs: draft-release
    uses: ./.github/workflows/build-image.yml
    with:
      tag: "${{ github.event.inputs.name }}"
    permissions:
      contents: read
      id-token: write
  publish_release:
    name: Publish release
    needs: [ validate-release, draft-release, builds ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
      - name: Wait for the Docker image
        timeout-minutes: 20
        env:
          ITERATIONS: 40
          SLEEP_SECONDS: 30
        run: ./.github/scripts/release/wait_for_image.sh ${{ env.IMAGE_REPO }}:${{ github.event.inputs.name }} ${{ env.ITERATIONS }} ${{ env.SLEEP_SECONDS }}
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./.github/scripts/release/publish_release.sh ${{ needs.draft-release.outputs.release_id }}
