name: Build Image (Local testing / ghcr.io)

# Builds lifecycle-manager multi-platform images for local testing.
# The image is exported as an OCI tarball and uploaded as an artifact.
# A separate workflow (publish-image-local.yml) pushes it to ghcr.io.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".reuse/**"
      - "LICENSES/**"
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".reuse/**"
      - "LICENSES/**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Additional image tag (e.g. v1.2.3 or my-feature)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image (OCI tarball)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          outputs: type=oci,dest=/tmp/image.tar
          build-args: |
            TAG_default_tag=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-oci
          path: /tmp/image.tar
          retention-days: 1
          if-no-files-found: error
