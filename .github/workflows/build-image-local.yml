name: Build Image (Local testing / ghcr.io)

# Builds lifecycle-manager multi-platform images for local testing.
# The image is exported as an OCI tarball and uploaded as an artifact.
# A separate workflow (publish-image-local.yml) pushes it to ghcr.io.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".reuse/**"
      - "LICENSES/**"
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".reuse/**"
      - "LICENSES/**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Additional image tag (e.g. v1.2.3 or my-feature)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Build image (OCI tarball)
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          outputs: type=oci,dest=/tmp/image.tar
          build-args: |
            TAG_default_tag=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write build metadata
        run: |
          cat > /tmp/metadata.json <<EOF
          {
            "event_name": "${{ github.event_name }}",
            "sha": "${{ github.sha }}",
            "pr_number": "${{ github.event.pull_request.number }}",
            "dispatch_tag": "${{ inputs.tag }}",
            "ref": "${{ github.ref }}"
          }
          EOF

      - name: Upload image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: image-oci
          path: /tmp/image.tar
          retention-days: 1
          if-no-files-found: error

      - name: Upload metadata artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: image-metadata
          path: /tmp/metadata.json
          retention-days: 1
          if-no-files-found: error
