name: Build Image (Local testing / ghcr.io)

# Builds lifecycle-manager multi-platform images for local testing.
# The image is exported as an OCI tarball and uploaded as an artifact.
# A separate workflow (publish-image-local.yml) pushes it to ghcr.io.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".reuse/**"
      - "LICENSES/**"
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".reuse/**"
      - "LICENSES/**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Additional image tag (e.g. v1.2.3 or my-feature)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build image (OCI tarball)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          outputs: type=oci,dest=/tmp/image.tar
          build-args: |
            TAG_default_tag=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-oci
          path: /tmp/image.tar
          retention-days: 1
          if-no-files-found: error
